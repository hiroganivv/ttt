[package]
name = "iptv-proxy"
version = "1.0.0"
edition = "2021"
authors = ["IPTV Proxy Team"]

[dependencies]
pingora = { version = "0.5", default-features = false, features = ["lb"] }
pingora-core = { version = "0.5", default-features = false }
async-trait = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
bytes = "1"
url = "2"
regex = "1"
once_cell = "1"
log = "0.4"
env_logger = "0.11"
ahash = "0.8"
memchr = "2"
num_cpus = "1"
# openssl = { version = "0.10", features = ["vendored"], optional = true }  # 如果需要HTTPS

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"

[profile.release.package."*"]
opt-level = 3

[patch.crates-io]
# 如果仍有sfv版本不兼容，取消注释
# sfv = "=0.12.0"
