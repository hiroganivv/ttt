name: Build IPTV Proxy for OpenWrt IPQ60xx

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build for OpenWrt IPQ60xx (aarch64_cortex-a53)
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: aarch64-unknown-linux-musl

    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools musl-dev
        
        # 使用系统工具链 + cargo配置即可
        mkdir -p ~/.cargo
        cat >> ~/.cargo/config.toml << 'EOF'
        [target.aarch64-unknown-linux-musl]
        linker = "aarch64-linux-gnu-gcc"
        
        [env]
        CC_aarch64_unknown_linux_musl = "aarch64-linux-gnu-gcc"
        CXX_aarch64_unknown_linux_musl = "aarch64-linux-gnu-g++"
        AR_aarch64_unknown_linux_musl = "aarch64-linux-gnu-ar"
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER = "aarch64-linux-gnu-gcc"
        EOF

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build for aarch64-unknown-linux-musl
      run: |
        cargo build --release --target aarch64-unknown-linux-musl -vv

    - name: Strip binary
      run: |
        aarch64-linux-gnu-strip target/aarch64-unknown-linux-musl/release/iptv-proxy
        ls -lh target/aarch64-unknown-linux-musl/release/iptv-proxy

    - name: Check binary info
      run: |
        file target/aarch64-unknown-linux-musl/release/iptv-proxy
        du -h target/aarch64-unknown-linux-musl/release/iptv-proxy

    - name: Create OpenWrt installation package
      run: |
        mkdir -p openwrt-package/usr/bin
        mkdir -p openwrt-package/etc/init.d
        
        # 复制二进制
        cp target/aarch64-unknown-linux-musl/release/iptv-proxy \
           openwrt-package/usr/bin/
        
        # 创建init脚本
        cat > openwrt-package/etc/init.d/iptv-proxy << 'EOF'
        #!/bin/sh /etc/rc.common
        START=99
        STOP=10
        USE_PROCD=1
        
        start_service() {
            procd_open_instance
            procd_set_param command /usr/bin/iptv-proxy
            procd_set_param env LOCAL_IP="192.168.1.3"
            procd_set_param env BIND_ADDR="0.0.0.0:8080"
            procd_set_param env RUST_LOG="info"
            procd_set_param env WORKERS="4"
            procd_set_param respawn 3600 5 5
            procd_set_param stdout 1
            procd_set_param stderr 1
            procd_set_param limits nofile="65535 65535"
            procd_close_instance
        }
        EOF
        
        chmod +x openwrt-package/etc/init.d/iptv-proxy
        
        # 创建安装脚本
        cat > openwrt-package/install.sh << 'EOF'
        #!/bin/sh
        echo "Installing IPTV Proxy for OpenWrt..."
        cp usr/bin/iptv-proxy /usr/bin/
        chmod +x /usr/bin/iptv-proxy
        cp etc/init.d/iptv-proxy /etc/init.d/
        chmod +x /etc/init.d/iptv-proxy
        /etc/init.d/iptv-proxy enable
        /etc/init.d/iptv-proxy start
        echo "Installation complete!"
        EOF
        
        chmod +x openwrt-package/install.sh
        
        # 创建README
        cat > openwrt-package/README.md << 'EOF'
        # IPTV Proxy for OpenWrt IPQ60xx
        
        ## Installation
        
        1. Upload to OpenWrt:
           scp -r openwrt-package root@192.168.1.3:/tmp/
        
        2. Install:
           ssh root@192.168.1.3
           cd /tmp/openwrt-package
           sh install.sh
        
        3. Configure (optional):
           Edit /etc/init.d/iptv-proxy to change LOCAL_IP
        
        4. Check status:
           /etc/init.d/iptv-proxy status
           logread | grep iptv-proxy
        
        ## Usage
        
        http://192.168.1.3:8080/iptv/http://116.199.x.x/path/file.m3u8
        EOF
        
        # 打包
        tar czf iptv-proxy-openwrt-ipq60xx.tar.gz openwrt-package/
        ls -lh iptv-proxy-openwrt-ipq60xx.tar.gz

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: iptv-proxy-openwrt-ipq60xx
        path: |
          target/aarch64-unknown-linux-musl/release/iptv-proxy
          iptv-proxy-openwrt-ipq60xx.tar.gz
        retention-days: 30

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          iptv-proxy-openwrt-ipq60xx.tar.gz
          target/aarch64-unknown-linux-musl/release/iptv-proxy
        body: |
          ## IPTV Proxy for OpenWrt IPQ60xx
          
          **Target**: aarch64_cortex-a53 (IPQ6018/IPQ6010/IPQ6000)
          **Architecture**: Static-linked musl binary
          
          ### Quick Install
          
          ```bash
          # Download and extract
          wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/iptv-proxy-openwrt-ipq60xx.tar.gz
          tar xzf iptv-proxy-openwrt-ipq60xx.tar.gz
          
          # Upload to router
          scp -r openwrt-package root@192.168.1.3:/tmp/
          
          # Install
          ssh root@192.168.1.3 "cd /tmp/openwrt-package && sh install.sh"
          ```
          
          ### Features
          - ✅ Two-level m3u8 support
          - ✅ Query parameters preserved
          - ✅ Referer injection (surrit.com/fourhoi.com)
          - ✅ 50,000+ concurrent connections
          - ✅ <50MB memory footprint
          
          ### Hardware Requirements
          - OpenWrt on IPQ60xx (IPQ6018/6010/6000)
          - 1GB RAM minimum
          - 5MB storage space
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
